    <meta name="description" content="A Vite + React application optimized for SEO with proper meta tags and titles." />

    <!-- Google Fonts for Modern Bite Template -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  
      <script src="https://greta-preview.s3.us-east-2.amazonaws.com/previews/greta-scripts/inspector2.js"></script>
      <script 
        src="https://quest-public-files-c.s3.us-east-2.amazonaws.com/greta-scripts/runtime-instrumentation-minified.js" 
        data-init
        data-patch="fetch:post XMLHttpRequest:post"
        data-targetWindow="top"
        data-targetOrigin="*"
      ></script>
      <script>
        window.addEventListener("load", () => {
          setTimeout(() => {
            const el = document.querySelector("[data-greta-id]");
            window.parent.postMessage({
              type: "IFRAME_LOADED",
              found: !!el,
            }, "*");
          }, 1000);
        });
      </script>
    </body>
</html>
